spring:
  application:
    name: questionbank-api

  profiles:
    active: dev

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  cache:
    type: caffeine
    cache-names: questions,question,companies,tags,sessions
    caffeine:
      spec: maximumSize=500,expireAfterWrite=600s

server:
  port: 8080
  servlet:
    context-path: /

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# --- App-specific config ---
app:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
