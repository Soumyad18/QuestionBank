# --- Dev profile: credentials come from environment variables ---
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          auth: true
          starttls:
            enabled: true
            required: true

# Supabase JWT secret + AI + Cache TTLs
app:
  auth:
    supabase-url: ${SUPABASE_URL}

  ai:
    provider: ${AI_PROVIDER:groq}              # "gemini" or "groq"
    gemini-api-key: ${GEMINI_API_KEY:not-set}
    gemini-model: ${AI_MODEL:llama-3.3-70b-versatile}
    groq-api-key: ${GROQ_API_KEY:not-set}

  email:
    sender-email: ${GMAIL_USERNAME}
    sender-name: QuestionBank

  cache:
    questions-ttl: 600      # 10 min
    question-ttl: 1800      # 30 min
    companies-ttl: 3600     # 60 min
    tags-ttl: 3600          # 60 min
    sessions-ttl: 1800      # 30 min

logging:
  level:
    com.qb: DEBUG
    org.hibernate.SQL: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
